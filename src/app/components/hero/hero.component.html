<section
  id="home"
  class="min-h-screen flex flex-col md:flex-row items-center justify-between px-6 md:px-16 pt-0 bg-[#0b1120] text-white relative overflow-hidden"
>

  <!-- Background Glow -->
  <div class="absolute top-[-200px] left-[-200px] w-[500px] h-[500px] bg-blue-500/20 rounded-full blur-[150px]"></div>
  <div class="absolute bottom-[-200px] right-[-200px] w-[500px] h-[500px] bg-indigo-500/20 rounded-full blur-[150px]"></div>

  <!-- LEFT SIDE -->
  <div class="max-w-xl relative z-10">

    <p class="text-blue-400 text-xs md:text-sm mb-6 border border-blue-400 inline-block px-4 py-1 rounded-full tracking-wider backdrop-blur-md bg-white/5">
      AVAILABLE FOR OPPORTUNITIES
    </p>

    <h1 class="text-4xl md:text-6xl font-bold leading-tight">
      Sagar <br>
      <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-500">
        Akuch
      </span>
    </h1>

    <!-- Typing Text -->
    <h2 class="text-xl md:text-2xl text-gray-400 mt-4">
      {{ currentText }}
    </h2>

    <p class="text-gray-400 mt-6 leading-relaxed text-sm md:text-base">
      Full Stack .NET Developer with 3+ years of experience building scalable
      web applications using ASP.NET Core, Web API, Angular and SQL Server.
    </p>

    <div class="flex flex-col sm:flex-row gap-4 mt-8">

      <a
        href="#projects"
        class="bg-gradient-to-r from-blue-600 to-indigo-600 hover:scale-105 transition px-6 py-3 rounded-xl font-semibold shadow-lg text-center"
      >
        View Projects →
      </a>

      <a
        href="#contact"
        class="border border-gray-600 hover:border-blue-500 hover:text-blue-400 transition px-6 py-3 rounded-xl text-center"
      >
        Contact Me
      </a>

    </div>

  </div>

  <!-- RIGHT SIDE PROFILE -->
  <div
    class="relative mt-16 md:mt-0 flex items-center justify-center z-10"
    (mousemove)="handleMouseMove($event)"
    [style.transform]="'rotateX(' + rotateX + 'deg) rotateY(' + rotateY + 'deg)'"
  >

    <div class="relative w-[320px] h-[320px] md:w-[420px] md:h-[420px] flex items-center justify-center">

      <!-- Rotating Glow -->
      <div class="absolute w-full h-full rounded-full animate-spin-slow bg-gradient-to-r from-blue-500 via-indigo-500 to-purple-500 blur-2xl opacity-25"></div>

      <!-- Glass Circle -->
      <div class="absolute w-[260px] h-[260px] md:w-[340px] md:h-[340px] bg-white/5 backdrop-blur-xl rounded-full border border-white/10"></div>

      <!-- Profile Image -->
      <div class="relative z-20 float-animation">

        <img
          src="assets/Profile.png"
          alt="Sagar Akuch"
          class="w-56 h-56 md:w-72 md:h-72 object-cover rounded-full border-4 border-blue-500 shadow-[0_0_60px_rgba(59,130,246,0.6)]"
        />

      </div>

    </div>

  </div>

</section>
