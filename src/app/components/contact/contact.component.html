<section
  id="contact"
  class="relative bg-[#0b1120] text-white py-24 px-6 md:px-16 overflow-hidden"
>

  <!-- Background -->
  <div class="absolute inset-0 bg-grid-pattern opacity-20"></div>

  <div class="absolute top-[-200px] left-[-200px] w-[500px] h-[500px] bg-blue-500/20 rounded-full blur-[150px]"></div>
  <div class="absolute bottom-[-200px] right-[-200px] w-[500px] h-[500px] bg-indigo-500/20 rounded-full blur-[150px]"></div>

  <div class="relative max-w-7xl mx-auto">

    <!-- HEADER -->
    <h2 class="text-3xl md:text-5xl font-bold mb-6">
      Get In <span class="text-blue-500">Touch</span>
    </h2>

    <div class="grid md:grid-cols-2 gap-16 mt-12">

      <!-- CONTACT INFO -->
      <div class="space-y-6">

        <a
          href="mailto:sagarakuch.net88@gmail.com"
          class="flex items-center gap-4 bg-gradient-to-br from-[#0f172a]/80 to-[#111827]/80 backdrop-blur-xl p-6 rounded-2xl border border-white/10 hover:border-blue-500 transition duration-300 shadow-glowSoft"
        >
          <i class="lucide lucide-mail text-blue-500"></i>
          <div>
            <h4 class="font-semibold">Email</h4>
            <p class="text-gray-400 text-sm">sagarakuch.net88@gmail.com</p>
          </div>
        </a>

        <a
          href="tel:+919699084007"
          class="flex items-center gap-4 bg-gradient-to-br from-[#0f172a]/80 to-[#111827]/80 backdrop-blur-xl p-6 rounded-2xl border border-white/10 hover:border-blue-500 transition duration-300 shadow-glowSoft"
        >
          <i class="lucide lucide-phone text-blue-500"></i>
          <div>
            <h4 class="font-semibold">Phone</h4>
            <p class="text-gray-400 text-sm">+91 9699084007</p>
          </div>
        </a>

        <a
          href="https://www.linkedin.com/in/sagar-akuch-95448419a/"
          target="_blank"
          class="flex items-center gap-4 bg-gradient-to-br from-[#0f172a]/80 to-[#111827]/80 backdrop-blur-xl p-6 rounded-2xl border border-white/10 hover:border-blue-500 transition duration-300 shadow-glowSoft"
        >
          <i class="lucide lucide-linkedin text-blue-500"></i>
          <div>
            <h4 class="font-semibold">LinkedIn</h4>
            <p class="text-gray-400 text-sm">View Profile</p>
          </div>
        </a>

        <a
          href="https://www.google.com/maps?q=Pune"
          target="_blank"
          class="flex items-center gap-4 bg-gradient-to-br from-[#0f172a]/80 to-[#111827]/80 backdrop-blur-xl p-6 rounded-2xl border border-white/10 hover:border-blue-500 transition duration-300 shadow-glowSoft"
        >
          <i class="lucide lucide-map-pin text-blue-500"></i>
          <div>
            <h4 class="font-semibold">Location</h4>
            <p class="text-gray-400 text-sm">Pune, Maharashtra</p>
          </div>
        </a>

      </div>

      <!-- CONTACT FORM -->
      <div
        class="bg-gradient-to-br from-[#0f172a]/80 to-[#111827]/80 backdrop-blur-xl p-8 rounded-2xl border border-white/10 shadow-glowSoft"
      >

        <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="space-y-6">

          <!-- Name -->
          <div>
            <input
              formControlName="name"
              placeholder="Full Name"
              class="w-full p-4 bg-[#111827]/80 rounded-xl border border-white/10 focus:border-blue-500 focus:outline-none transition"
            />
          </div>

          <!-- Email -->
          <div>
            <input
              formControlName="email"
              placeholder="Email Address"
              class="w-full p-4 bg-[#111827]/80 rounded-xl border border-white/10 focus:border-blue-500 focus:outline-none transition"
            />
          </div>

          <!-- Subject -->
          <div>
            <input
              formControlName="subject"
              placeholder="Subject"
              class="w-full p-4 bg-[#111827]/80 rounded-xl border border-white/10 focus:border-blue-500 focus:outline-none transition"
            />
          </div>

          <!-- Message -->
          <div>
            <textarea
              rows="5"
              formControlName="message"
              placeholder="Your Message"
              class="w-full p-4 bg-[#111827]/80 rounded-xl border border-white/10 focus:border-blue-500 focus:outline-none transition"
            ></textarea>
          </div>

          <!-- Submit -->
          <button
            type="submit"
            [disabled]="loading"
            class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 py-4 rounded-xl font-semibold flex justify-center items-center gap-3 hover:scale-105 transition duration-300 shadow-lg"
          >

            <span *ngIf="!loading">Send Message →</span>

            <span *ngIf="loading" class="flex items-center gap-2">
              <span class="loader"></span>
              Sending...
            </span>

          </button>

        </form>

      </div>

    </div>

  </div>

</section>
