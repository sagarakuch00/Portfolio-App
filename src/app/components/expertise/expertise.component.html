<section
  id="expertise"
  class="relative bg-[#0b1120] text-white py-24 px-6 md:px-16 overflow-hidden"
>

  <!-- Background -->
  <div class="absolute inset-0 bg-grid-pattern opacity-20"></div>

  <div class="absolute top-[-200px] left-[-200px] w-[500px] h-[500px] bg-blue-500/20 rounded-full blur-[150px]"></div>
  <div class="absolute bottom-[-200px] right-[-200px] w-[500px] h-[500px] bg-indigo-500/20 rounded-full blur-[150px]"></div>

  <div class="relative max-w-7xl mx-auto text-center">

    <!-- HEADER -->
    <p class="text-blue-400 uppercase tracking-widest text-xs md:text-sm">
      My Expertise
    </p>

    <h2 class="text-3xl md:text-4xl font-bold mt-3">
      Technical Skills
    </h2>

    <p class="text-gray-400 mt-4 max-w-2xl mx-auto text-sm md:text-base">
      Full Stack .NET Developer with experience in building scalable web applications,
      developing REST APIs, designing responsive UI with Angular, and managing
      SQL Server databases for enterprise-level applications.
    </p>

    <!-- SKILL CARDS -->
    <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-8 mt-16">

      <div
        *ngFor="let category of skillsData"
        class="bg-gradient-to-br from-[#0f172a]/80 to-[#111827]/80 border border-white/10 p-6 rounded-2xl shadow-glowSoft backdrop-blur-xl hover:border-blue-500 transition duration-300 hover:-translate-y-2"
      >

        <h3 class="text-lg md:text-xl font-semibold mb-6">
          {{ category.title }}
        </h3>

        <div class="flex flex-wrap gap-2 justify-center md:justify-start">

          <!-- Skill Tag -->
          <span
            *ngFor="let skill of category.skills"
            class="flex items-center gap-2 bg-[#1e293b]/70 backdrop-blur-md text-gray-300 text-xs md:text-sm px-3 py-1 rounded-full border border-white/10 hover:bg-blue-600 hover:text-white transition duration-300"
          >

            <!-- Angular -->
            <i *ngIf="skill === 'Angular'" class="devicon-angularjs-plain colored"></i>

            <!-- .NET -->
            <i *ngIf="skill === 'ASP.NET Core'" class="devicon-dotnetcore-plain colored"></i>

            <!-- C# -->
            <i *ngIf="skill === 'C#'" class="devicon-csharp-plain colored"></i>

            <!-- SQL Server -->
            <i *ngIf="skill === 'SQL Server'" class="devicon-microsoftsqlserver-plain colored"></i>

            <!-- JavaScript -->
            <i *ngIf="skill === 'JavaScript'" class="devicon-javascript-plain colored"></i>

            <!-- TypeScript -->
            <i *ngIf="skill === 'TypeScript'" class="devicon-typescript-plain colored"></i>

            <!-- Bootstrap -->
            <i *ngIf="skill === 'Bootstrap'" class="devicon-bootstrap-plain colored"></i>

            <!-- GitHub -->
            <i *ngIf="skill === 'GitHub'" class="devicon-github-original"></i>

            <!-- Default -->
            {{ skill }}

          </span>

        </div>

      </div>

    </div>

  </div>

</section>
