<section
  id="experience"
  class="relative bg-[#0b1120] text-white py-24 px-6 md:px-16 overflow-hidden"
>
  <!-- Background -->
  <div class="absolute inset-0 bg-grid-pattern opacity-20"></div>

  <div
    class="absolute top-[-200px] right-[-200px] w-[500px] h-[500px] bg-blue-500/20 rounded-full blur-[150px]"
  ></div>
  <div
    class="absolute bottom-[-200px] left-[-200px] w-[500px] h-[500px] bg-indigo-500/20 rounded-full blur-[150px]"
  ></div>

  <div class="relative max-w-6xl mx-auto">
    <!-- HEADER -->
    <h2 class="text-3xl md:text-5xl font-bold mb-4">Work Experience</h2>

    <p class="text-gray-400 max-w-3xl mb-20 text-sm md:text-base">
      Professional experience building scalable web applications, APIs, and
      enterprise systems using .NET technologies.
    </p>

    <!-- TIMELINE -->
    <div class="relative">
      <!-- Vertical Line -->
      <div
        class="hidden md:block absolute left-1/2 -translate-x-1/2 w-1 h-full bg-blue-600/30"
      ></div>

      <div
        *ngFor="let exp of experiences; let i = index"
        class="relative mb-20 md:flex md:items-center md:justify-between"
      >
        <!-- LEFT SIDE -->
        <div *ngIf="i % 2 === 0" class="md:w-1/2 md:pr-14">
          <ng-container
            *ngTemplateOutlet="experienceCard; context: { exp: exp }"
          ></ng-container>
        </div>

        <!-- LEFT SPACER -->
        <div *ngIf="i % 2 !== 0" class="hidden md:block md:w-1/2"></div>

        <!-- DOT -->
        <div
          class="hidden md:block absolute left-1/2 -translate-x-1/2 w-5 h-5 bg-blue-600 rounded-full shadow-glow"
        ></div>

        <!-- RIGHT SIDE -->
        <div *ngIf="i % 2 !== 0" class="md:w-1/2 md:pl-14">
          <ng-container
            *ngTemplateOutlet="experienceCard; context: { exp: exp }"
          ></ng-container>
        </div>

        <!-- RIGHT SPACER -->
        <div *ngIf="i % 2 === 0" class="hidden md:block md:w-1/2"></div>
      </div>
    </div>

    <!-- TEMPLATE -->
    <ng-template #experienceCard let-exp="exp">
      <div
        class="bg-gradient-to-br from-[#0f172a]/80 to-[#111827]/80 border border-white/10 rounded-2xl p-6 md:p-8 backdrop-blur-xl shadow-glowSoft hover:scale-[1.03] transition duration-300"
      >
        <span class="text-sm text-blue-400 font-semibold">
          {{ exp.period }}
        </span>

        <h3 class="text-xl md:text-2xl font-semibold mt-2">
          {{ exp.role }}
        </h3>

        <p class="text-blue-400 mb-4">
          {{ exp.company }}
        </p>

        <ul class="space-y-3 text-gray-300 text-sm md:text-base">
          <li *ngFor="let item of exp.points">✔ {{ item }}</li>
        </ul>

        <div class="flex flex-wrap gap-2 mt-6">
          <span
            *ngFor="let tech of exp.tech"
            class="bg-[#1e293b]/70 backdrop-blur-md text-gray-300 text-xs px-3 py-1 rounded-full border border-white/10 hover:bg-blue-600 hover:text-white transition"
          >
            {{ tech }}
          </span>
        </div>
      </div>
    </ng-template>

    <!-- KEY FOCUS -->
    <div
      class="mt-24 bg-gradient-to-br from-[#0f172a]/80 to-[#111827]/80 border border-white/10 rounded-2xl p-8 md:p-12 backdrop-blur-xl shadow-glowSoft"
    >
      <h3 class="text-2xl md:text-3xl font-bold mb-10">Key Focus Areas</h3>

      <div class="grid sm:grid-cols-2 md:grid-cols-3 gap-10">
        <div
          *ngFor="let focus of focusAreas"
          class="hover:scale-105 transition"
        >
          <h4 class="text-blue-400 font-semibold mb-2">
            {{ focus.title }}
          </h4>

          <p class="text-gray-400 text-sm md:text-base">
            {{ focus.desc }}
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
