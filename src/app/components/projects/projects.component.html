<section
  id="projects"
  class="relative bg-[#0b1120] text-white py-24 px-6 md:px-16 overflow-hidden"
>

  <!-- Background Grid -->
  <div class="absolute inset-0 bg-grid-pattern opacity-20"></div>

  <!-- Lighting -->
  <div class="absolute top-[-200px] left-[-200px] w-[500px] h-[500px] bg-blue-500/20 rounded-full blur-[150px]"></div>
  <div class="absolute bottom-[-200px] right-[-200px] w-[500px] h-[500px] bg-purple-500/20 rounded-full blur-[150px]"></div>

  <div class="relative max-w-7xl mx-auto">

    <!-- HEADER -->
    <div>

      <h2 class="text-3xl md:text-5xl font-bold mb-4">
        Featured Projects
      </h2>

      <!-- UPDATED DESCRIPTION -->
      <p class="text-gray-400 max-w-3xl mb-20 text-sm md:text-base">
        Real-world full stack applications built using ASP.NET Core, Angular
        and SQL Server focusing on scalable architecture, secure APIs
        and responsive user interfaces.
      </p>

    </div>

    <!-- PROJECT GRID -->
    <!-- UPDATED GRID -->
    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-12">

      <div
        *ngFor="let project of projects"
        class="group bg-gradient-to-br from-[#0f172a]/80 to-[#111827]/80 border border-white/10 rounded-2xl overflow-hidden backdrop-blur-xl shadow-glowSoft transition duration-300 hover:-translate-y-2"
        [class]="project.border"
      >

        <!-- Image -->
        <div class="relative overflow-hidden">

          <img
            [src]="project.image"
            [alt]="project.title"
            class="w-full h-70 object-cover opacity-90 group-hover:scale-110 transition duration-700"
          />

          <span
            class="absolute top-4 right-4 text-xs px-4 py-1 rounded-full font-semibold shadow-md"
            [class]="project.tagColor"
          >
            {{ project.tag }}
          </span>

        </div>

        <!-- Content -->
        <div class="p-8">

          <h3 class="text-xl md:text-2xl font-bold mb-4">
            {{ project.title }}
          </h3>

          <p class="text-gray-400 mb-6 text-sm md:text-base">
            {{ project.description }}
          </p>

          <ul class="space-y-3 text-gray-300 mb-6 text-sm md:text-base">

            <li *ngFor="let point of project.points">
              ✔ {{ point }}
            </li>

          </ul>

          <div class="flex flex-wrap gap-2">

            <span
              *ngFor="let tech of project.tech"
              class="bg-[#1e293b]/70 text-gray-300 text-xs px-3 py-1 rounded-full border border-white/10 hover:text-white transition"
              [class]="project.techColor"
            >
              {{ tech }}
            </span>

          </div>

        </div>

      </div>

    </div>

  </div>

</section>
