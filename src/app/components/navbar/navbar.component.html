<nav class="sticky top-0 z-50 bg-[#0b1120]/80 backdrop-blur-xl border-b border-white/10">

  <div class="max-w-7xl mx-auto px-6 md:px-16 py-3 flex items-center justify-between">

    <!-- LOGO -->
    <div
      class="relative flex items-center justify-center group cursor-pointer"
      (click)="scrollTo('home')"
    >

      <div class="absolute w-24 h-24 md:w-28 md:h-28 bg-blue-500/20 rounded-full blur-3xl animate-pulse-soft"></div>

      <img
        src="assets/logo.png"
        alt="Logo"
        class="relative z-10 h-14 md:h-18 w-auto object-contain drop-shadow-[0_0_25px_rgba(59,130,246,0.9)] group-hover:scale-110 transition-all duration-500"
      />

    </div>

    <!-- DESKTOP NAV -->
    <ul class="hidden md:flex gap-10 text-gray-300 text-sm absolute left-1/2 transform -translate-x-1/2">

      <li *ngFor="let link of navLinks">

        <a
          (click)="scrollTo(link.id)"
          class="relative group transition cursor-pointer"
        >

          <span class="group-hover:text-blue-500 transition">
            {{ link.name }}
          </span>

          <span class="absolute left-0 -bottom-1 w-0 h-[2px] bg-blue-500 transition-all duration-300 group-hover:w-full"></span>

        </a>

      </li>

    </ul>

    <!-- RIGHT SIDE -->
    <div class="flex items-center gap-4">

      <!-- Download CV -->
      <a
        href="assets/Sagar_Akuch_Resume.pdf"
        download="Sagar_Akuch_Resume.pdf"
        class="hidden md:flex items-center gap-2 bg-gradient-to-r from-blue-600 to-indigo-600 px-5 py-2 rounded-lg text-sm transition hover:scale-105"
      >
        Download CV
      </a>

      <!-- Mobile Menu Button -->
      <button
        class="md:hidden text-gray-300"
        (click)="toggleMenu()"
      >

        <span *ngIf="!isOpen">☰</span>
        <span *ngIf="isOpen">✕</span>

      </button>

    </div>

  </div>

  <!-- MOBILE MENU -->
  <div
    *ngIf="isOpen"
    class="md:hidden bg-[#0f172a]/95 backdrop-blur-xl border-t border-white/10 px-6 py-6 space-y-6 text-center"
  >

    <a
      *ngFor="let link of navLinks"
      (click)="scrollTo(link.id)"
      class="block text-gray-300 hover:text-blue-500 transition text-lg cursor-pointer"
    >
      {{ link.name }}
    </a>

    <!-- Mobile CV -->
    <a
      href="assets/Sagar_Akuch_Resume.pdf"
      download="Sagar_Akuch_Resume.pdf"
      class="block bg-gradient-to-r from-blue-600 to-indigo-600 px-6 py-3 rounded-lg text-sm transition"
    >
      Download CV
    </a>

  </div>

</nav>
